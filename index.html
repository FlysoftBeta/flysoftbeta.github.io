<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flysoft</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .browser {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 100%;
        }
    </style>
    <script>
        window.onload = () => {
            var browser = document.querySelector(".browser");
            var url = "http://212.129.248.224";
            var query = window.location.search.substring(1);
            var args = query.split("&");
            var path = "/";
            for (var i = 0; i < args.length; i++) {
                var arg = args[i].split("=");
                if (arg.length == 2 && arg[0] == "path") {
                    path = "/" + arg[1];
                }
            }
            browser.src = url + path + "?" + query;
        };
    </script>
</head>

<body>
    <iframe frameborder="0" class="browser"></iframe>
</body>

</html>
